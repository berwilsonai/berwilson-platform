<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f8fafc; padding: 40px 20px;">
    <div style="max-width: 420px; margin: 0 auto; background: white; border-radius: 8px; padding: 40px 32px; border: 1px solid #e2e8f0;">
      <h1 style="font-size: 14px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #0f172a; text-align: center; margin: 0 0 8px;">
        Ber Wilson
      </h1>
      <p style="font-size: 13px; color: #64748b; text-align: center; margin: 0 0 32px;">
        Executive Intelligence Platform
      </p>
      <p style="font-size: 14px; color: #334155; line-height: 1.6; margin: 0 0 24px;">
        You've been invited to the Ber Wilson Intelligence Platform. Click the button below to set your password and get started.
      </p>
      <div style="text-align: center; margin: 0 0 24px;">
        <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=invite"
           style="display: inline-block; background-color: #0f172a; color: white; font-size: 14px; font-weight: 500; padding: 10px 24px; border-radius: 6px; text-decoration: none;">
          Set Password &amp; Sign In
        </a>
      </div>
      <p style="font-size: 12px; color: #94a3b8; text-align: center; margin: 0;">
        This link expires in 24 hours. Internal use only.
      </p>
    </div>
  </body>
</html>
